name: Scrape LLM Pricing

on:
  schedule:
    - cron: '0 8 * * *'       # 08:00 UTC daily
  workflow_dispatch:           # Manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python -m scraper.main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Upload daily snapshot to R2
        run: |
          SNAPSHOT_DATE=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/pricing.json").read_text())
          print(data["last_updated"][:10])
          PY
          )
          wrangler r2 object put "${R2_BUCKET}/history/${SNAPSHOT_DATE}.json" \
            --remote \
            --file data/pricing.json \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=31536000, immutable"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Update R2 history index
        run: |
          SNAPSHOT_DATE=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/pricing.json").read_text())
          print(data["last_updated"][:10])
          PY
          )
          python scripts/update_r2_history_index.py --bucket "${R2_BUCKET}" --date "${SNAPSHOT_DATE}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Rebuild summary from R2 snapshots
        run: python scripts/rebuild_summary_from_r2.py --bucket "${R2_BUCKET}" --days 365
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update pricing data"
          file_pattern: |
            data/pricing.json
            data/history/summary.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
