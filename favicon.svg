      <stop offset="0.55" stop-color="#0861B6"/>
      <stop offset="1" stop-color="#042B63"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <!-- brain outline (simplified) -->
  <path d="M140 120 C100 80 36 108 30 166 C-4 160 22 230 40 250 C20 280 60 340 100 340 C100 390 150 410 188 380 C220 420 280 400 280 350 L280 120 Z"
