<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM API 定价追踪 — 大模型 API Pricing</title>
  <meta name="description" content="实时追踪各大LLM模型API定价，支持OpenAI、Anthropic、Google、xAI、DeepSeek、千问、豆包、文心、Kimi、GLM、MiniMax等模型价格对比">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div>
        <h1>大模型 API 定价追踪</h1>
        <p class="subtitle">单位：人民币元 / 1M tokens <span class="rate-badge-inline">USD/CNY ≈ <span id="rate-value">--</span></span></p>
      </div>
      <div class="header-meta">
        <span class="update-badge" id="update-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="update-time">加载中...</span>
        </span>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="controls">
      <div class="controls-row">
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="search-input" placeholder="搜索模型..." autocomplete="off">
          <button class="search-clear hidden" id="search-clear" aria-label="清除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="tier-filters" id="tier-filters">
          <button class="tier-btn active" data-tier="all">全部</button>
          <button class="tier-btn" data-tier="pro">Pro / Max</button>
          <button class="tier-btn" data-tier="lite">Lite / Flash</button>
        </div>
      </div>

      <div class="controls-row">
        <div class="provider-dropdown" id="provider-dropdown">
          <button class="dropdown-toggle" id="dropdown-toggle">
            <span id="dropdown-label">全部厂商</span>
            <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dropdown-menu hidden" id="dropdown-menu">
            <div class="dropdown-search">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="provider-search" placeholder="搜索厂商..." autocomplete="off">
            </div>
            <div class="dropdown-actions">
              <button class="dropdown-action" id="select-all">全选</button>
              <button class="dropdown-action" id="deselect-all">取消全选</button>
            </div>
            <div class="dropdown-list" id="dropdown-list"></div>
          </div>
        </div>

        <div class="stats-bar" id="stats-bar"></div>
      </div>
    </div>

    <div class="table-wrap">
      <table id="pricing-table">
        <thead>
          <tr>
            <th data-sort="provider">厂商</th>
            <th data-sort="name" class="sort-default">模型</th>
            <th data-sort="context" class="num">上下文</th>
            <th data-sort="input" class="num">输入 /1M</th>
            <th data-sort="cached" class="num">缓存输入 /1M</th>
            <th data-sort="output" class="num">输出 /1M</th>
            <th data-sort="updated" class="num sort-desc">更新日期</th>
            <th style="width:100px">趋势</th>
            <th>官网</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div id="no-results" class="no-results hidden">
      <p>没有匹配的模型</p>
      <p class="hint">试试调整搜索条件或清除筛选</p>
    </div>

    <div id="loading" class="loading">
      <div class="skeleton" style="height:400px"></div>
    </div>

    <div id="error-state" class="error-state hidden">
      <p>数据加载失败</p>
      <p class="hint">请稍后刷新页面重试</p>
    </div>
  </main>

  <footer class="footer">
    <p>数据每日自动更新 · USD 价格按当日汇率转换为人民币 · <a href="https://github.com/skyan/llm-pricing">GitHub</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
